<!DOCTYPE html>
<html>
<head>
    <title>AI Customer Ticketing System</title>
</head>
<body>

    <h1>AI-Based Customer Ticketing System</h1>

    <form>
        <label>Customer Name:</label><br>
        <input type="text" id="name"><br><br>

        <label>Issue Description:</label><br>
        <textarea id="issue" rows="4" cols="40"></textarea><br><br>

        <button type="button" onclick="generateTicket()">
            Create Ticket
        </button>
    </form>

    <h2>Ticket Details</h2>
    <p id="result"></p>

    <script>
        function generateTicket() {
            let name = document.getElementById("name").value;
            let issue = document.getElementById("issue").value.toLowerCase();

            let category = "General Inquiry";
            let priority = "Low";

            if(issue.includes("payment") || issue.includes("refund")) {
                category = "Billing";
                priority = "High";
            }
            else if(issue.includes("login") || issue.includes("password")) {
                category = "Account";
                priority = "Medium";
            }
            else if(issue.includes("error") || issue.includes("bug")) {
                category = "Technical Support";
                priority = "High";
            }

            document.getElementById("result").innerHTML =
                "<b>Customer:</b> " + name + "<br>" +
                "<b>Category:</b> " + category + "<br>" +
                "<b>Priority:</b> " + priority + "<br>" +
                "<b>Status:</b> Open";
        }
    </script>

</body>
</html>
